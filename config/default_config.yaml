providers: [jira]

jira:
  credentials: ""
  url: https://company.atlassian.net
  email: you@example.com
  defaultJql: "assignee = currentUser() AND status = 'To Do'"
  defaultProject: ""
  doneTransitions: {}

todoist:
  credentials: ""
  defaultFilter: "today | overdue"
  defaultProject: ""

github:
  credentials: ""
  defaultQuery: "is:pr state:open review-requested:@me"
  repos: []

local:
  storePath: ""
  defaultFilter: ""
  defaultProject: ""

kendo:
  credentials: ""
  url: ""
  defaultFilter: ""
  defaultProject: ""
  doneLane: ""

calendar:
  credentials: ""
  sourceCalendars: [primary]
  fyllaCalendar: fylla

scheduling:
  windowDays: 5
  minTaskDurationMinutes: 25
  bufferMinutes: 15
  travelBufferMinutes: 30
  snapMinutes: [0, 15, 30, 45]
  autoResync: false

businessHours:
  - start: "09:00"
    end: "17:00"
    workDays: [1, 2, 3, 4, 5]

projectRules:
  ADMIN:
    - start: "09:00"
      end: "10:00"
      workDays: [1, 2, 3, 4, 5]

worklog:
  provider: ""
  fallbackIssues: []

efficiency:
  weeklyHours: 40
  dailyHours: 8
  target: 0.7

weights:
  priority: 0.45
  dueDate: 0.30
  estimate: 0.15
  age: 0.10
  upNext: 50
