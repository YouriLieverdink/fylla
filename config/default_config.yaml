# Task providers to fetch work from: todoist, github, local, kendo.
# jibble may also be listed, but it is worklog-only — it supplies no tasks and
# is used as a worklog.provider target (see below).
providers: [local]

todoist:
  defaultFilter: "today | overdue"
  defaultProject: ""

github:
  defaultQueries:
    - "is:pr state:open review-requested:@me"
  repos: []

local:
  storePath: ""
  defaultFilter: ""
  defaultProject: ""

kendo:
  url: ""
  defaultFilter: ""
  defaultProject: ""
  doneLane: ""

calendar:
  sourceCalendars: [primary]
  fyllaCalendar: fylla

scheduling:
  windowDays: 5
  minTaskDurationMinutes: 25
  maxTaskDurationMinutes: 0  # 0 = unlimited (no forced splitting)
  bufferMinutes: 15
  travelBufferMinutes: 30
  snapMinutes: [0, 15, 30, 45]
  defaultEstimateMinutes: 60  # used when a task has no remaining estimate
  providerTimeoutSeconds: 15  # per-provider fetch timeout; 0 = no timeout
  taskCacheTTLSeconds: 30     # in-memory task cache TTL shared by tasks+schedule tabs
  previewTimeoutSeconds: 20   # hard deadline for SyncPreview (schedule tab refresh)

businessHours:
  - start: "09:00"
    end: "17:00"
    workDays: [1, 2, 3, 4, 5]

projectRules:
  ADMIN:
    - start: "09:00"
      end: "10:00"
      workDays: [1, 2, 3, 4, 5]

worklog:
  # Where logged hours go. Empty = first entry in `providers`. Set to a specific
  # provider (e.g. kendo, jibble) to decouple time tracking from the task source.
  # With jibble, list it in `providers` too and set provider: jibble; the focus
  # timer prompts a Jibble "Client / Project" to book each session against, and
  # `targets` below may name Jibble Projects by their bare name (e.g. ICie).
  provider: ""
  fallbackIssues: []
  roundMinutes: 1

efficiency:
  weeklyHours: 40
  dailyHours: 8
  target: 0.7

targets: []
# Soft hour goals per project. Each entry:
#   project:   project code from the worklog provider (e.g. "PROJ")
#   hours:     minimum hours to log in the period (e.g. 24)
#   scope:     "me" (default) or "anyone"
#   period:    "monthly" (default), "weekly", or "biweekly"
#   anchor:    YYYY-MM-DD; required for biweekly (any date inside cycle 0).
#              For weekly, anchor's weekday becomes the cycle start (default Mon).
#   startDate: fixed-range override (paired with endDate; mutually exclusive with period)
#   endDate:   fixed-range override

holidays: []
# Days (or partial windows) blocked from work. Subtract from worklog targets and
# scheduler. Each entry:
#   date:  YYYY-MM-DD (required)
#   start: HH:MM      (optional; pair with end to block a partial window)
#   end:   HH:MM      (optional)
# Omit start/end to mark the whole day off. Multiple entries may share a date
# for multiple non-overlapping blocks (e.g. one hour off morning + one off afternoon).
# Examples:
#   - date: 2026-04-27           # full day off
#   - date: 2026-05-05
#     start: "13:00"             # afternoon off
#     end:   "17:00"
#   - date: 2026-05-06
#     start: "09:00"
#     end:   "10:00"
#   - date: 2026-05-06
#     start: "16:00"
#     end:   "17:00"

sickDays: []
# Sick days — same format and effect as holidays (block scheduling, subtract
# from worklog targets), tracked and labelled separately in the TUI. Each entry:
#   date:  YYYY-MM-DD (required)
#   start: HH:MM      (optional; pair with end to block a partial window)
#   end:   HH:MM      (optional)
# Examples:
#   - date: 2026-05-12           # full sick day
#   - date: 2026-05-13
#     start: "13:00"             # left sick at noon
#     end:   "17:00"

tui:
  # Hide TUI tabs by label. Valid: Dashboard, Focus, Tasks, Schedule, Tuning, Worklog, Targets, Config.
  disabledTabs: []

weights:
  priority: 0.45
  dueDate: 0.30
  estimate: 0.15
  age: 0.10
  upNext: 50
  # Per-priority raw score (P1..P5). Edit in the Tuning tab or here directly.
  priorityLevels: [100, 80, 60, 40, 20]
  # typeBonus:                  # flat score bonus per issue type
  #   "Pull Request": 15
