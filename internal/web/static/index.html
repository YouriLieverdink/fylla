<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fylla Dashboard</title>
  <link rel="stylesheet" href="/app.css">
  <script defer src="/vendor/alpine.min.js"></script>
  <script defer src="/vendor/htmx.min.js"></script>
</head>
<body x-data="dashboard()" x-init="init()">
  <header>
    <h1>Fylla</h1>
    <nav>
      <a href="/timeline" :class="{ active: tab === 'timeline' }" @click.prevent="navigate('timeline')">Timeline</a>
      <a href="/tasks" :class="{ active: tab === 'tasks' }" @click.prevent="navigate('tasks')">Tasks</a>
      <a href="/schedule" :class="{ active: tab === 'schedule' }" @click.prevent="navigate('schedule')">Schedule</a>
      <a href="/status" :class="{ active: tab === 'status' }" @click.prevent="navigate('status')">Status</a>
    </nav>
  </header>

  <main>
    <!-- Timeline Tab -->
    <section x-show="tab === 'timeline'" x-cloak>
      <div class="section-header">
        <h2>Today's Timeline</h2>
        <span class="refresh-info" x-text="lastRefresh ? 'Updated ' + timeAgo(lastRefresh) : ''"></span>
      </div>
      <template x-if="loading.today">
        <div class="loading">Loading timeline...</div>
      </template>
      <template x-if="!loading.today && events.length === 0">
        <div class="empty">No events scheduled for today.</div>
      </template>
      <div class="timeline" x-show="!loading.today && events.length > 0">
        <template x-for="event in events" :key="event.start + event.summary">
          <div class="timeline-event" :class="{ 'calendar-event': event.isCalendarEvent, 'at-risk': event.atRisk, 'current': isCurrentEvent(event) }">
            <div class="event-time">
              <span x-text="formatTime(event.start)"></span>
              <span class="time-sep">–</span>
              <span x-text="formatTime(event.end)"></span>
            </div>
            <div class="event-details">
              <span class="event-key" x-show="event.taskKey" x-text="event.taskKey"></span>
              <span class="event-project" x-show="event.project" x-text="'[' + event.project + ']'"></span>
              <span class="event-summary" x-text="event.summary"></span>
              <span class="badge badge-risk" x-show="event.atRisk">AT RISK</span>
              <span class="badge badge-current" x-show="isCurrentEvent(event)">NOW</span>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- Tasks Tab -->
    <section x-show="tab === 'tasks'" x-cloak>
      <div class="section-header">
        <h2>Task List</h2>
        <span class="task-count" x-show="tasks.length > 0" x-text="tasks.length + ' task(s)'"></span>
      </div>
      <template x-if="loading.tasks">
        <div class="loading">Loading tasks...</div>
      </template>
      <template x-if="!loading.tasks && tasks.length === 0">
        <div class="empty">No tasks found.</div>
      </template>
      <table class="task-table" x-show="!loading.tasks && tasks.length > 0">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th class="col-key">Key</th>
            <th class="col-summary">Summary</th>
            <th class="col-priority">Priority</th>
            <th class="col-estimate">Estimate</th>
            <th class="col-due">Due Date</th>
            <th class="col-score">Score</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(task, i) in tasks" :key="task.key">
            <tr :class="{ 'up-next': task.upNext }">
              <td class="col-num" x-text="i + 1"></td>
              <td class="col-key">
                <span x-text="task.key"></span>
                <span class="badge badge-upnext" x-show="task.upNext">UP NEXT</span>
              </td>
              <td class="col-summary">
                <span class="task-project" x-show="task.project" x-text="'[' + task.project + '] '"></span>
                <span x-text="task.summary"></span>
              </td>
              <td class="col-priority">
                <span class="priority-badge" :class="'priority-' + task.priority" x-text="priorityLabel(task.priority)"></span>
              </td>
              <td class="col-estimate" x-text="task.estimate"></td>
              <td class="col-due" x-text="task.dueDate || '—'"></td>
              <td class="col-score" x-text="task.score.toFixed(1)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </section>

    <!-- Schedule Tab -->
    <section x-show="tab === 'schedule'" x-cloak>
      <div class="section-header">
        <h2>Multi-Day Schedule</h2>
        <span class="refresh-info">(dry-run preview)</span>
      </div>
      <template x-if="loading.schedule">
        <div class="loading">Loading schedule...</div>
      </template>
      <template x-if="!loading.schedule && schedule">
        <div>
          <template x-if="schedule.allocations.length === 0">
            <div class="empty">No tasks scheduled.</div>
          </template>
          <div class="schedule-list" x-show="schedule.allocations.length > 0">
            <template x-for="group in groupByDay(schedule.allocations)" :key="group.day">
              <div class="schedule-day">
                <h3 x-text="group.day"></h3>
                <template x-for="alloc in group.items" :key="alloc.start + alloc.taskKey">
                  <div class="schedule-item" :class="{ 'at-risk': alloc.atRisk }">
                    <span class="sched-time" x-text="formatTime(alloc.start) + ' – ' + formatTime(alloc.end)"></span>
                    <span class="sched-key" x-text="alloc.taskKey"></span>
                    <span class="sched-summary" x-text="alloc.summary"></span>
                    <span class="badge badge-risk" x-show="alloc.atRisk">AT RISK</span>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <div class="at-risk-section" x-show="schedule.atRisk.length > 0">
            <h3>At-Risk Tasks</h3>
            <template x-for="ar in schedule.atRisk" :key="ar.taskKey">
              <div class="at-risk-item">
                <span x-text="ar.taskKey"></span>: <span x-text="ar.summary"></span>
              </div>
            </template>
          </div>

          <div class="unscheduled-section" x-show="schedule.unscheduled.length > 0">
            <h3>Unscheduled</h3>
            <template x-for="u in schedule.unscheduled" :key="u.taskKey">
              <div class="unscheduled-item">
                <span class="unsched-key" x-text="u.taskKey"></span>
                <span x-text="u.summary"></span>
                <span class="unsched-reason" x-text="u.reason"></span>
              </div>
            </template>
          </div>
        </div>
      </template>
    </section>

    <!-- Status Tab -->
    <section x-show="tab === 'status'" x-cloak>
      <h2>Configuration</h2>
      <template x-if="loading.status">
        <div class="loading">Loading status...</div>
      </template>
      <template x-if="!loading.status && status">
        <div class="status-grid">
          <div class="status-card">
            <h3>Providers</h3>
            <ul>
              <template x-for="p in status.providers" :key="p">
                <li x-text="p"></li>
              </template>
            </ul>
          </div>
          <div class="status-card">
            <h3>Business Hours</h3>
            <template x-for="bh in status.businessHours" :key="bh.Start + bh.End">
              <div>
                <span x-text="bh.Start + ' – ' + bh.End"></span>
                <span class="work-days" x-text="'(days: ' + bh.WorkDays.join(', ') + ')'"></span>
              </div>
            </template>
          </div>
          <div class="status-card">
            <h3>Scheduling</h3>
            <div>Window: <strong x-text="status.windowDays + ' days'"></strong></div>
            <div>Buffer: <strong x-text="status.bufferMinutes + ' min'"></strong></div>
          </div>
        </div>
      </template>
    </section>

    <div class="error-toast" x-show="error" x-text="error" @click="error = null" x-transition></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
